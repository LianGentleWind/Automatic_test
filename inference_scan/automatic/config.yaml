# 自动化参数扫描与分析系统配置文件

# 参数扫描配置
scan:
  # 基础runtime配置文件路径
  base_runtime_config: "./automatic/base/runtime_miniwse.json"
  # 基础系统配置文件路径（如果param_path指向系统配置中的参数）
  base_sys_config: "./automatic/base/miniwse.json"
  
  # 参数列表：支持 1~N 个可变参数（当前实现 1~2 个，3+ 预留接口）
  # 多个参数时会进行排列组合（笛卡尔积）生成所有配置
  scan_params:
    - param_path: "pd-split-request-optimal.sequence_length_list[0][0]"
      # target 必填：明确指定该参数属于哪个配置文件
      # runtime - 基础 runtime 配置 (base_runtime_config)
      # sys     - 基础 硬件系统 配置 (base_sys_config)
      target: runtime
      
      # 参数生成模式配置
      param_mode:
        # format 格式类型：
        #   single          - 单个数值
        #   pair            - 相同值数组（如 [1,1]）
        #   pair_null_first - 仅修改第二个值（如 [null, v]）
        #   手动/manual     - 直接使用 values 数组中定义的值进行测试
        format: single
        
        # value_type 数值生成类型（当 format != 手动 时生效）：
        #   arithmetic - 等差数列
        #   power_of_2 - 2的幂次
        value_type: power_of_2
        
        # power_of_2 模式参数：2^10=1K 到 2^20=1M
        start_power: 10
        end_power: 20
        
        # arithmetic 模式参数示例
        # start: 1024
        # end: 1048576
        # step: 1024
        
        # 手动 模式参数示例
        # values: [1, 2, 3]

    # 可选的第二个扫描参数（取消注释即可启用两参数扫描）
    - param_path: "mem1.GiB"
      target: sys
      param_mode:
        format: 手动
        values: [1, 2, 3]

  # 输出目录
  output_dir: "./automatic/test_results"
  # 生成的配置文件保存目录
  generated_configs_dir: "./automatic/generated_configs"
  # 生成的运行脚本路径
  commands_file: "./automatic/run_simulations.sh"

# 运行配置
run:
  # 仿真命令模板
  command: "python3 run.py -c"

# 分析配置
analyze:
  # 结果目录（扫描此目录下的所有CSV文件）
  results_dir: "./automatic/test_results"
  # 汇总分析输出文件
  output_file: "./automatic/analysis_summary.csv"
  # 需要提取的关键字段列表
  key_fields:
    - "decoder_throughput(token/s)"
    - "decoder_throughput_per_npu(token/s)"

# ===============================================
# ===============================================
# 
# [target: sys] 
# -----------------------------------------------
# 内存参数
# mem1.GiB            
# mem1.GBps          
# mem2.GiB 
# mem2.GBps 
#
# 网络参数
# networks[0].bandwidth  
# networks[1].bandwidth  
#
# -----------------------------------------------
# [target: runtime] 
# -----------------------------------------------
# 核心通信/并行参数
# pd-split-request-optimal.sequence_length_list[0][0] : 输入序列长度
# pd-split-request-optimal.sequence_length_list[0][1] : 输出序列长度
# pd-split-request-optimal.num_procs_list[0]          : 总 NPU 处理器数量
#
# 并行策略配置 (DP/TP/PP/EP 等)
# pd-split-request-optimal.p_parallel_config[0][0]: prefill 阶段并行度 0
# pd-split-request-optimal.p_parallel_config[0][1]: prefill 阶段并行度 1
# pd-split-request-optimal.p_parallel_config[0][2]: prefill 阶段并行度 2
# pd-split-request-optimal.p_moe_parallel_config[0][0]: prefill MOE 并行度 0
# pd-split-request-optimal.wac_bytes_list[0][0]: 权重激活显存占比等

