# 自动化参数扫描与分析系统配置文件

# 参数扫描配置
scan:
  # 基础runtime配置文件路径
  base_runtime_config: "./automatic/base/runtime_miniwse.json"
  # 基础系统配置文件路径（如果param_path指向系统配置中的参数）
  base_sys_config: "./automatic/base/miniwse.json"
  
  # 参数列表：支持 1~N 个可变参数（当前实现 1~2 个，3+ 预留接口）
  # 多个参数时会进行排列组合（笛卡尔积）生成所有配置
  scan_params:
    - param_path: "pd-split-request-optimal.sequence_length_list[0][0]"
      # 参数目标配置文件：runtime（运行时配置）或 sys（硬件系统配置）
      target: runtime
      # 参数生成模式配置
      param_mode:
        # 格式类型：single（单个数值）、pair（相同值数组如[1,1]）或 pair_null_first（[null, v] 仅修改第二个值）
        format: single
        # 数值类型：arithmetic（等差数列）或 power_of_2（2的幂次）
        value_type: power_of_2
        # power_of_2 模式参数：2^10=1K 到 2^20=1M
        start_power: 10
        end_power: 20
        # arithmetic 模式参数（当 value_type 为 arithmetic 时使用）
        # start: 1024
        # end: 1048576
        # step: 1024
    
    # 可选的第二个扫描参数（取消注释即可启用两参数扫描）
    - param_path: "mem1.GiB"
      target: sys
      param_mode:
        format: single
        value_type: arithmetic
        start: 64
        end: 256
        step: 64
  
  # 输出目录
  output_dir: "./automatic/test_results"
  # 生成的配置文件保存目录
  generated_configs_dir: "./automatic/generated_configs"
  # 生成的运行脚本路径
  commands_file: "./automatic/run_simulations.sh"

# 运行配置
run:
  # 仿真命令模板
  command: "python3 run.py -c"

# 分析配置
analyze:
  # 结果目录（扫描此目录下的所有CSV文件）
  results_dir: "./automatic/test_results"
  # 汇总分析输出文件
  output_file: "./automatic/analysis_summary.csv"
  # 需要提取的关键字段列表
  key_fields:
    - "decoder_throughput(token/s)"
    - "decoder_throughput_per_npu(token/s)"

# 可视化配置
visualize:
  # 输出目录
  output_dir: "./automatic/plots"
  # 图片格式（png, pdf, svg）
  format: "png"
  # DPI
  dpi: 150
